services:
  mysql:
    image: mysql:8.4
    container_name: kg-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-KgRoot@2026!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-semiconductor_kg}
      MYSQL_USER: ${MYSQL_USER:-kg_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-KgUser@2026!}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USER:-kg_user}", "-p${MYSQL_PASSWORD:-KgUser@2026!}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  neo4j:
    image: neo4j:5.26-community
    container_name: kg-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-KgNeo4j@2026!}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "neo4j status || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s

  web:
    build: .
    container_name: kg-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      NEO4J_URI: bolt://neo4j:7687
      FLASK_DEBUG: "0"
      DEEPSEEK_SKIP_HEALTHCHECK: "1"
    ports:
      - "${WEB_HOST_PORT:-5001}:5000"
    volumes:
      - ./automation/inbox:/app/automation/inbox
      - ./automation/outbox:/app/automation/outbox
      - ./automation/processed:/app/automation/processed
      - ./automation/logs:/app/automation/logs
      - ./scripts:/app/scripts:ro
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  pipeline:
    build: .
    container_name: kg-pipeline
    profiles: ["pipeline"]
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      NEO4J_URI: bolt://neo4j:7687
      DEEPSEEK_SKIP_HEALTHCHECK: "1"
      PIPELINE_AUTO_APPLY: ${PIPELINE_AUTO_APPLY:-0}
    volumes:
      - ./automation/inbox:/app/automation/inbox
      - ./automation/outbox:/app/automation/outbox
      - ./automation/processed:/app/automation/processed
      - ./automation/logs:/app/automation/logs
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    entrypoint: ["python", "automation/pipeline.py"]
    command: ["--watch"]

volumes:
  mysql_data:
  neo4j_data:
